<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🔄 JSON 格式化 & 对比</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../theme.css">
  <style>
    /* ===== Tool-specific styles ===== */
    .format-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .format-layout textarea {
      width: 100%;
      height: 300px;
      padding: 12px;
      border: 1px solid var(--border-input);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: var(--font-mono);
      resize: vertical;
      line-height: 1.5;
      tab-size: 2;
      background: var(--bg-input);
      color: var(--text-primary);
    }

    .format-layout textarea:focus {
      outline: none;
      border-color: var(--accent-1);
      box-shadow: 0 0 0 2px rgba(108,92,231,0.15);
    }

    .jf-output {
      width: 100%;
      min-height: 300px;
      max-height: 500px;
      padding: 12px;
      border: 1px solid var(--border-input);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: var(--font-mono);
      line-height: 1.5;
      overflow: auto;
      background: var(--bg-input);
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text-primary);
    }

    .jf-output-code { white-space: pre-wrap; }
    .jf-output-tree { white-space: normal; font-family: var(--font-body); }

    .jf-key { color: var(--accent-3); }
    .jf-string { color: var(--accent-8); }
    .jf-number { color: var(--accent-7); }
    .jf-boolean { color: var(--accent-7); }
    .jf-null { color: var(--text-tertiary); }
    .jf-bracket { color: var(--text-primary); }
    .jf-count { color: var(--text-tertiary); font-size: 12px; margin-left: 4px; }
    .jf-index { color: var(--text-tertiary); font-size: 12px; }

    .jf-tree-branch { margin: 2px 0; }
    .jf-tree-summary { cursor: pointer; padding: 2px 0; }
    .jf-tree-summary:hover { background: var(--bg-tab-hover); }
    .jf-tree-children { padding-left: 20px; }
    .jf-tree-item { padding: 1px 0; }
    .jf-tree-leaf { margin: 2px 0; }

    .query-area {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border-subtle);
    }

    .query-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .query-row input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid var(--border-input);
      border-radius: 6px;
      font-size: 13px;
      font-family: var(--font-mono);
      background: var(--bg-input);
      color: var(--text-primary);
    }

    .query-row input:focus { outline: none; border-color: var(--accent-1); }

    .jf-query-value {
      margin-top: 8px;
      padding: 10px;
      background: var(--bg-input);
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.5;
      overflow: auto;
      max-height: 200px;
      color: var(--text-primary);
    }

    .diff-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .diff-layout textarea {
      width: 100%;
      height: 250px;
      padding: 12px;
      border: 1px solid var(--border-input);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: var(--font-mono);
      resize: vertical;
      line-height: 1.5;
      background: var(--bg-input);
      color: var(--text-primary);
    }

    .diff-layout textarea:focus { outline: none; border-color: var(--accent-1); }

    .diff-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .diff-actions select {
      padding: 6px 10px;
      border: 1px solid var(--border-input);
      border-radius: 6px;
      font-size: 13px;
      font-family: var(--font-body);
      background: var(--bg-input);
      color: var(--text-primary);
    }

    .jf-diff-list { font-size: 13px; }
    .jf-diff-header { margin-bottom: 8px; }
    .jf-diff-stat { font-weight: 600; color: var(--text-primary); }
    .jf-diff-item {
      padding: 8px 10px;
      margin-bottom: 4px;
      border-radius: 6px;
      border-left: 3px solid transparent;
    }
    .jf-diff-added { background: rgba(0,184,148,0.1); border-left-color: var(--accent-8); }
    .jf-diff-removed { background: rgba(214,48,49,0.1); border-left-color: var(--accent-9); }
    .jf-diff-modified { background: rgba(253,203,110,0.1); border-left-color: var(--accent-5); }
    .jf-diff-path { font-weight: 600; color: var(--text-primary); font-family: var(--font-mono); font-size: 12px; }
    .jf-diff-type { font-size: 11px; color: var(--text-tertiary); margin: 2px 0; }
    .jf-diff-value { font-family: var(--font-mono); font-size: 12px; padding: 2px 0; }
    .jf-diff-value.added { color: var(--accent-8); }
    .jf-diff-value.removed { color: var(--accent-3); }
    .jf-diff-undefined { color: var(--text-tertiary); font-style: italic; }
    .jf-diff-object { color: var(--text-primary); white-space: pre-wrap; }
    .jf-diff-nochange { padding: 20px; text-align: center; color: var(--accent-8); font-size: 16px; }

    .jf-diff-side { font-size: 13px; }
    .jf-diff-side-header { margin-bottom: 8px; }
    .jf-diff-side-row {
      display: grid;
      grid-template-columns: 1fr 60px 1fr 1fr;
      gap: 8px;
      padding: 6px 8px;
      margin-bottom: 2px;
      border-radius: 4px;
      align-items: center;
    }
    .jf-diff-side-row.jf-diff-added { background: rgba(0,184,148,0.1); }
    .jf-diff-side-row.jf-diff-removed { background: rgba(214,48,49,0.1); }
    .jf-diff-side-row.jf-diff-modified { background: rgba(253,203,110,0.1); }
    .jf-diff-side-path { font-family: var(--font-mono); font-size: 12px; font-weight: 600; }
    .jf-diff-side-type { font-size: 11px; color: var(--text-tertiary); text-align: center; }
    .jf-diff-side-old, .jf-diff-side-new {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .jf-diff-side-old { background: rgba(214,48,49,0.15); }
    .jf-diff-side-new { background: rgba(0,184,148,0.15); }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .jf-history-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
    }
    .jf-history-item:last-child { border-bottom: none; }

    .jf-history-title {
      font-size: 13px;
      color: var(--text-primary);
      flex: 1;
    }

    .jf-history-detail {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-left: 8px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .jf-history-remove {
      position: absolute;
      right: 4px; top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent-9);
      color: #fff;
      border: none;
      font-size: 11px;
      cursor: pointer;
      display: none;
      line-height: 18px;
      text-align: center;
    }

    .jf-history-item:hover .jf-history-remove { display: block; }

    .jf-empty {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: 10px;
      display: block;
    }

    @media (max-width: 768px) {
      .format-layout { grid-template-columns: 1fr; }
      .format-layout textarea { height: 200px; }
      .jf-output { min-height: 200px; }
      .diff-layout { grid-template-columns: 1fr; }
      .diff-layout textarea { height: 150px; }
      .jf-diff-side-row { grid-template-columns: 1fr 40px 1fr; }
    }

    @media (max-width: 400px) {
      .jf-output { min-height: 150px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-bar">
      <a class="back-btn" href="../../index.html">← 返回首页</a>
    </div>
    <div class="demo-title">
      <h1>🔄 JSON 格式化 & 对比</h1>
      <p>纯前端实现 · 语法高亮 · 差异对比 · 路径查询</p>
    </div>

    <div class="jf-tabs">
      <button class="jf-tab-btn active">🔧 格式化</button>
      <button class="jf-tab-btn">🔍 对比</button>
    </div>

    <!-- Tab 1: 格式化 -->
    <div class="jf-tab-content active">
      <div class="card">
        <h2>🔧 JSON 格式化 / 压缩 / 校验</h2>
        <div class="format-layout">
          <div>
            <h3>输入 JSON</h3>
            <textarea id="inputJSON" placeholder="在此粘贴或输入 JSON 内容..." spellcheck="false"></textarea>
          </div>
          <div>
            <h3>输出结果</h3>
            <div class="jf-output" id="outputJSON">
              <span style="color:var(--text-muted);">点击"格式化"或"压缩"查看结果</span>
            </div>
          </div>
        </div>

        <div class="action-bar">
          <button class="btn btn-primary" id="formatBtn">✨ 格式化</button>
          <button class="btn btn-warning" id="compressBtn">📦 压缩</button>
          <button class="btn btn-default" id="validateBtn">✅ 校验</button>
          <button class="btn btn-success" id="copyBtn">📋 复制</button>
          <button class="btn btn-default" id="clearBtn">🔄 清空</button>
          <label>缩进:</label>
          <select id="indentSelect"></select>
          <label>视图:</label>
          <select id="viewModeSelect"></select>
        </div>

        <div class="error-display" id="errorDisplay"></div>

        <div class="query-area">
          <h3>🔍 JSON 路径查询</h3>
          <div class="query-row">
            <input type="text" id="queryInput" placeholder="输入路径，如 $.name 或 $.users[0].email" spellcheck="false">
            <button class="btn btn-primary btn-small" id="queryBtn">查询</button>
          </div>
          <div class="jf-query-value" id="queryResult"></div>
        </div>
      </div>

      <div class="card">
        <div class="history-header">
          <h2>📋 历史记录</h2>
          <button class="btn btn-small btn-danger" id="clearHistoryBtn">🗑️ 清空</button>
        </div>
        <div id="historyList"><span class="jf-empty">暂无记录</span></div>
      </div>
    </div>

    <!-- Tab 2: 对比 -->
    <div class="jf-tab-content">
      <div class="card">
        <h2>🔍 JSON 差异对比</h2>
        <div class="diff-layout">
          <div>
            <h3>左侧（旧）</h3>
            <textarea id="leftJSON" placeholder="粘贴左侧 JSON..." spellcheck="false"></textarea>
          </div>
          <div>
            <h3>右侧（新）</h3>
            <textarea id="rightJSON" placeholder="粘贴右侧 JSON..." spellcheck="false"></textarea>
          </div>
        </div>

        <div class="diff-actions">
          <button class="btn btn-primary" id="diffBtn">🔍 对比</button>
          <label>对比模式:</label>
          <select id="diffModeSelect"></select>
        </div>

        <div class="jf-diff-list" id="diffResult" style="margin-top:16px;">
          <span style="color:var(--text-muted);">点击"对比"查看差异</span>
        </div>
      </div>
    </div>
  </div>

  <script src="./config.js"></script>
  <script src="./json-engine.js"></script>
  <script src="./diff-engine.js"></script>
  <script src="./app.js"></script>
</body>
</html>
