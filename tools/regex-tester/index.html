<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>⏱️ 正则表达式测试工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../theme.css">
  <style>
    /* ===== Tool-specific styles ===== */
    .rq-search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .rq-search-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid var(--border-input);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: var(--font-body);
      background: var(--bg-input);
      color: var(--text-primary);
      transition: var(--transition);
    }

    .rq-search-row input:focus {
      outline: none;
      border-color: var(--accent-1);
      box-shadow: 0 0 0 2px rgba(108,92,231,0.15);
    }

    .rq-category-filter {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .rq-category-btn {
      padding: 4px 12px;
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      background: transparent;
      color: var(--text-tertiary);
      transition: var(--transition);
      font-family: var(--font-body);
    }

    .rq-category-btn:hover {
      border-color: var(--accent-1);
      color: var(--accent-2);
    }

    .rq-category-btn.active {
      background: var(--accent-1);
      color: #fff;
      border-color: var(--accent-1);
    }

    .rq-stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .rq-results {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
    }

    .rq-result-item {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background 0.15s;
    }
    .rq-result-item:last-child { border-bottom: none; }
    .rq-result-item:hover { background: var(--bg-tab-hover); }

    .rq-result-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .rq-result-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .rq-result-category {
      font-size: 11px;
      padding: 1px 8px;
      background: var(--bg-highlight);
      color: var(--accent-2);
      border-radius: 10px;
      white-space: nowrap;
    }

    .rq-result-desc {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .rq-result-pattern {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--accent-8);
      background: rgba(0,184,148,0.08);
      padding: 4px 8px;
      border-radius: 4px;
      word-break: break-all;
      line-height: 1.5;
    }

    .rq-result-pattern .rq-highlight {
      background: var(--accent-5);
      padding: 0 2px;
      border-radius: 2px;
      color: #333;
    }

    .rq-result-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .rq-use-btn {
      padding: 3px 10px;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      background: var(--accent-1);
      color: #fff;
      transition: var(--transition);
      font-family: var(--font-body);
    }

    .rq-use-btn:hover { background: var(--accent-2); }

    .rq-copy-btn {
      padding: 3px 10px;
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      background: transparent;
      color: var(--text-tertiary);
      transition: var(--transition);
      font-family: var(--font-body);
    }

    .rq-copy-btn:hover { border-color: var(--accent-1); color: var(--accent-2); }

    .rq-empty {
      text-align: center;
      padding: 30px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .rq-empty-icon { font-size: 36px; margin-bottom: 8px; display: block; }
    .rq-empty-text { font-size: 13px; color: var(--text-muted); }

    .template-row { margin-bottom: 16px; }

    .template-row select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border-input);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: var(--font-body);
      background: var(--bg-input);
      color: var(--text-primary);
      cursor: pointer;
    }

    .template-row select:focus { outline: none; border-color: var(--accent-1); }

    .pattern-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .pattern-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid var(--border-input);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: var(--font-mono);
      background: var(--bg-input);
      color: var(--text-primary);
    }

    .pattern-row input:focus {
      outline: none;
      border-color: var(--accent-1);
      box-shadow: 0 0 0 2px rgba(108,92,231,0.15);
    }

    .rt-pattern-display {
      padding: 8px 12px;
      background: var(--bg-input);
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--accent-2);
      margin-bottom: 12px;
      word-break: break-all;
      border: 1px solid var(--border-subtle);
    }

    .rt-pattern-hint { color: var(--text-muted) !important; font-family: var(--font-body) !important; }

    .flag-toggles {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .rt-flag-label {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
      user-select: none;
      color: var(--text-tertiary);
    }

    .rt-flag-label:hover { border-color: var(--accent-1); color: var(--accent-2); }

    .rt-flag-label input:checked + span { color: var(--accent-2); font-weight: 600; }

    .rt-flag-label:has(input:checked) {
      border-color: var(--accent-1);
      background: var(--bg-highlight);
    }

    .rt-flag-label input { display: none; }

    .test-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .test-layout textarea {
      width: 100%;
      height: 200px;
      padding: 12px;
      border: 1px solid var(--border-input);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: var(--font-mono);
      resize: vertical;
      line-height: 1.6;
      background: var(--bg-input);
      color: var(--text-primary);
    }

    .test-layout textarea:focus { outline: none; border-color: var(--accent-1); }

    .rt-highlight-box {
      width: 100%;
      height: 200px;
      padding: 12px;
      border: 1px solid var(--border-input);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: var(--font-mono);
      line-height: 1.6;
      overflow: auto;
      background: var(--bg-input);
      white-space: pre-wrap;
      word-break: break-all;
      position: relative;
      color: var(--text-primary);
    }

    .rt-match { background: var(--accent-5); border-radius: 2px; padding: 0 1px; cursor: pointer; transition: background 0.2s; color: #333; }
    .rt-match:hover { background: #fab005; }

    .rt-error-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 8px 12px;
      background: rgba(214,48,49,0.9);
      color: #fff;
      font-size: 12px;
      font-family: var(--font-body);
    }

    .match-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .rt-match-count { font-size: 14px; font-weight: 600; }
    .rt-match-ok { color: var(--accent-8); }
    .rt-match-error { color: var(--accent-3); font-size: 12px; }

    .rt-match-list {
      margin-top: 12px;
      max-height: 300px;
      overflow-y: auto;
    }

    .rt-match-item {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .rt-match-item:last-child { border-bottom: none; }

    .rt-match-header { display: flex; gap: 12px; margin-bottom: 4px; }
    .rt-match-num { font-weight: 600; color: var(--accent-2); font-size: 12px; }
    .rt-match-pos { color: var(--text-tertiary); font-size: 12px; }

    .rt-match-value {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-primary);
      padding: 4px 8px;
      background: var(--bg-input);
      border-radius: 4px;
      word-break: break-all;
    }

    .rt-match-groups { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }

    .rt-group-item {
      font-size: 12px;
      padding: 2px 6px;
      background: var(--bg-highlight);
      border-radius: 4px;
    }

    .rt-group-label { color: var(--accent-2); font-weight: 600; }
    .rt-group-value { color: var(--text-primary); font-family: var(--font-mono); }

    .replace-area {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-subtle);
    }

    .replace-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .replace-row input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border-input);
      border-radius: 6px;
      font-size: 14px;
      font-family: var(--font-mono);
      min-width: 150px;
      background: var(--bg-input);
      color: var(--text-primary);
    }

    .replace-row input:focus { outline: none; border-color: var(--accent-1); }

    .replace-result-box {
      margin-top: 8px;
      padding: 10px 12px;
      background: var(--bg-input);
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.5;
      min-height: 40px;
      word-break: break-all;
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
    }

    .replace-count { font-size: 12px; color: var(--text-tertiary); margin-top: 4px; }

    .rt-syntax-toggle {
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
      transition: var(--transition);
      font-family: var(--font-body);
      width: 100%;
      text-align: left;
    }

    .rt-syntax-toggle:hover { background: var(--bg-tab-hover); color: var(--text-primary); }

    .rt-syntax-content { display: none; margin-top: 12px; }

    .rt-syntax-section { margin-bottom: 16px; }

    .rt-syntax-section h4 {
      font-size: 14px;
      color: var(--text-primary);
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .rt-syntax-table { width: 100%; border-collapse: collapse; }

    .rt-syntax-table td {
      padding: 4px 8px;
      font-size: 13px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }

    .rt-syntax-code {
      width: 120px;
      font-family: var(--font-mono);
      color: var(--accent-2);
      font-weight: 600;
    }

    .rt-syntax-code code {
      background: var(--bg-input);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 13px;
    }

    .rt-syntax-desc { color: var(--text-tertiary); }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .rt-history-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
    }
    .rt-history-item:last-child { border-bottom: none; }

    .rt-history-title {
      font-size: 13px;
      color: var(--text-primary);
      flex: 1;
    }

    .rt-history-detail {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-left: 8px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rt-history-remove {
      position: absolute;
      right: 4px; top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent-9);
      color: #fff;
      border: none;
      font-size: 11px;
      cursor: pointer;
      display: none;
      line-height: 18px;
      text-align: center;
    }

    .rt-history-item:hover .rt-history-remove { display: block; }

    .rt-empty {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: 10px;
      display: block;
    }

    @media (max-width: 768px) {
      .test-layout { grid-template-columns: 1fr; }
      .test-layout textarea { height: 150px; }
      .rt-highlight-box { height: 150px; }
      .pattern-row { flex-direction: column; }
      .pattern-row input { width: 100%; }
      .replace-row { flex-direction: column; }
      .replace-row input { width: 100%; }
      .flag-toggles { gap: 4px; }
      .rt-flag-label { font-size: 12px; padding: 3px 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-bar">
      <a class="back-btn" href="../index.html">← 返回首页</a>
    </div>
    <div class="demo-title">
      <h1>⏱️ 正则表达式测试工具</h1>
      <p>纯前端实现 · 实时匹配 · 捕获组展示 · 替换测试</p>
    </div>

    <div class="card">
      <h2>📝 常用正则模板</h2>
      <div class="template-row">
        <select id="templateSelect"></select>
      </div>
    </div>

    <div class="card">
      <h2>🔍 常用正则查询</h2>
      <div class="rq-search-row">
        <input type="text" id="rqSearchInput" placeholder="搜索正则名称、描述或内容..." spellcheck="false">
      </div>
      <div class="rq-category-filter" id="rqCategoryFilter"></div>
      <div class="rq-stats-bar">
        <span id="rqStatsText">输入关键词开始搜索</span>
        <span id="rqTotalCount"></span>
      </div>
      <div class="rq-results" id="rqResults">
        <div class="rq-empty">
          <span class="rq-empty-icon">🔍</span>
          <div class="rq-empty-text">输入关键词搜索常用正则表达式<br>支持按名称、描述、正则内容搜索</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>🔤 正则表达式</h2>
      <div class="pattern-row">
        <input type="text" id="patternInput" placeholder="输入正则表达式，如 [\w.-]+@[\w.-]+\.\w+" spellcheck="false">
      </div>
      <div class="rt-pattern-display" id="patternDisplay">输入正则表达式开始测试...</div>

      <h3>🏷️ 修饰符</h3>
      <div class="flag-toggles" id="flagToggles"></div>
    </div>

    <div class="card">
      <h2>📄 测试文本</h2>
      <div class="test-layout">
        <div>
          <h3>输入文本</h3>
          <textarea id="testText" placeholder="在此输入测试文本..." spellcheck="false">联系人: 张三
邮箱: zhangsan@example.com
电话: 13800138000
网址: https://www.example.com/path?query=value
备用邮箱: lisi@test.org
日期: 2024-01-15
时间: 14:30</textarea>
        </div>
        <div>
          <h3>匹配高亮</h3>
          <div class="rt-highlight-box" id="testHighlight">输入正则表达式和测试文本查看匹配结果</div>
        </div>
      </div>

      <div class="match-info">
        <div class="rt-match-count" id="matchCount">等待输入...</div>
      </div>
      <div class="rt-match-list" id="matchList">
        <span class="rt-empty">无匹配结果</span>
      </div>
    </div>

    <div class="card">
      <h2>🔄 替换测试</h2>
      <div class="replace-area">
        <div class="replace-row">
          <label style="font-size:13px;color:var(--text-tertiary);white-space:nowrap;">替换为:</label>
          <input type="text" id="replacementInput" placeholder="输入替换文本，如 ***" spellcheck="false">
          <button class="btn btn-primary" id="replaceBtn">🔄 替换</button>
        </div>
        <div class="replace-result-box" id="replaceResult">点击"替换"查看结果</div>
        <div class="replace-count" id="replaceCount"></div>
      </div>
    </div>

    <div class="card">
      <button class="rt-syntax-toggle" id="syntaxToggle">📖 语法参考 (点击展开)</button>
      <div class="rt-syntax-content" id="syntaxContent"></div>
    </div>

    <div class="card">
      <div class="history-header">
        <h2>📋 历史记录</h2>
        <button class="btn btn-small btn-danger" id="clearHistoryBtn">🗑️ 清空</button>
      </div>
      <div id="historyList">
        <span class="rt-empty">暂无记录</span>
      </div>
    </div>
  </div>

  <script src="./config.js"></script>
  <script src="./regex-engine.js"></script>
  <script src="./regex-query.js"></script>
  <script src="./app.js"></script>
</body>
</html>
