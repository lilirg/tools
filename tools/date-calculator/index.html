<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>📅 日期时间计算器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../theme.css">
  <style>
    /* ===== Tool-specific styles ===== */
    .result-box {
      display: none;
      margin-top: 16px;
      padding: 16px;
      background: rgba(0,184,148,0.08);
      border: 1px solid rgba(0,184,148,0.2);
      border-radius: var(--radius-sm);
    }
    .result-box.show { display: block; }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }

    .result-item {
      text-align: center;
      padding: 10px;
      background: var(--bg-input);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
    }

    .result-item .value {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent-2);
      display: block;
    }

    .result-item .label {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 4px;
      display: block;
    }

    .result-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
      padding: 12px;
    }

    .format-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .format-item:last-child { border-bottom: none; }

    .format-label {
      font-size: 13px;
      color: var(--text-tertiary);
      font-weight: 600;
      min-width: 140px;
    }

    .format-value {
      font-size: 14px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      word-break: break-all;
      text-align: right;
    }

    .tz-comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tz-box {
      padding: 14px;
      border-radius: var(--radius-sm);
      text-align: center;
    }

    .tz-box.source { background: rgba(108,92,231,0.1); border: 1px solid rgba(108,92,231,0.2); }
    .tz-box.target { background: rgba(0,184,148,0.1); border: 1px solid rgba(0,184,148,0.2); }

    .tz-box .tz-label { font-size: 12px; color: var(--text-tertiary); margin-bottom: 6px; }
    .tz-box .tz-time { font-size: 16px; font-weight: 600; color: var(--text-primary); }

    .tz-offset {
      grid-column: 1 / -1;
      text-align: center;
      padding: 8px;
      background: rgba(253,203,110,0.1);
      border: 1px solid rgba(253,203,110,0.3);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--accent-5);
    }

    .holiday-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-subtle);
      gap: 12px;
    }

    .holiday-item:last-child { border-bottom: none; }

    .holiday-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      min-width: 80px;
    }

    .holiday-date {
      font-size: 13px;
      color: var(--text-secondary);
      flex: 1;
    }

    .holiday-days {
      font-size: 13px;
      color: var(--accent-2);
      font-weight: 600;
    }

    .workday-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border-subtle);
    }

    .workday-section h4 {
      font-size: 14px;
      color: var(--accent-5);
      margin-bottom: 8px;
    }

    .workday-tag {
      display: inline-block;
      padding: 4px 10px;
      margin: 3px;
      background: rgba(253,203,110,0.1);
      border: 1px solid rgba(253,203,110,0.3);
      border-radius: 4px;
      font-size: 12px;
      color: var(--accent-5);
    }

    .check-result {
      text-align: center;
      padding: 16px;
      border-radius: var(--radius-sm);
      font-size: 18px;
      font-weight: 600;
    }

    .check-result.workday { background: rgba(108,92,231,0.1); border: 1px solid rgba(108,92,231,0.2); color: var(--accent-2); }
    .check-result.holiday { background: rgba(214,48,49,0.1); border: 1px solid rgba(214,48,49,0.3); color: var(--accent-3); }

    .next-holiday-card {
      text-align: center;
      padding: 20px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
      border-radius: var(--radius-md);
      color: #fff;
    }

    .next-holiday-name { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .next-holiday-date { font-size: 16px; margin-bottom: 8px; opacity: 0.9; }
    .next-holiday-countdown { font-size: 18px; }
    .next-holiday-countdown strong { font-size: 32px; }

    .empty-hint {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .result-grid { grid-template-columns: repeat(2, 1fr); }
      .tz-comparison { grid-template-columns: 1fr; }
      .format-item { flex-direction: column; align-items: flex-start; gap: 4px; }
      .format-label { min-width: auto; }
      .format-value { text-align: left; }
    }

    @media (max-width: 400px) {
      .result-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-bar">
      <a class="back-btn" href="../index.html">← 返回首页</a>
    </div>
    <div class="demo-title">
      <h1>📅 日期时间计算器</h1>
      <p>日期差 · 日期加减 · 工作日 · 年龄 · 时间戳 · 时区 · 节假日</p>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="0">📅 日期计算</button>
      <button class="tab-btn" data-tab="1">⏰ 时间戳转换</button>
      <button class="tab-btn" data-tab="2">🌍 时区转换</button>
      <button class="tab-btn" data-tab="3">🎉 节假日查询</button>
    </div>

    <!-- Tab 1: 日期计算 -->
    <div class="tab-content active" id="tab0">
      <div class="card">
        <h2>📊 日期差计算</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="date1">开始日期</label>
            <input type="date" id="date1">
          </div>
          <div class="form-group">
            <label for="date2">结束日期</label>
            <input type="date" id="date2">
          </div>
        </div>
        <button class="btn btn-primary btn-block" id="calcDiffBtn">📊 计算日期差</button>

        <div class="result-box" id="diffResult">
          <div class="result-grid">
            <div class="result-item"><span class="value" id="diffYears">0</span><span class="label">年</span></div>
            <div class="result-item"><span class="value" id="diffMonths">0</span><span class="label">月</span></div>
            <div class="result-item"><span class="value" id="diffDays">0</span><span class="label">日</span></div>
            <div class="result-item"><span class="value" id="diffHours">0</span><span class="label">时</span></div>
            <div class="result-item"><span class="value" id="diffMinutes">0</span><span class="label">分</span></div>
            <div class="result-item"><span class="value" id="diffSeconds">0</span><span class="label">秒</span></div>
          </div>
          <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border-subtle);">
            <div class="result-item" style="display:inline-block;margin-right:10px;">
              <span class="value" id="diffTotalDays">0</span><span class="label">总天数</span>
            </div>
            <div class="result-item" style="display:inline-block;">
              <span class="value" id="diffTotalHours">0</span><span class="label">总小时数</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>➕ 日期加减</h2>
        <div class="form-row-3">
          <div class="form-group">
            <label for="addDate">基准日期</label>
            <input type="date" id="addDate">
          </div>
          <div class="form-group">
            <label for="addAmount">数量</label>
            <input type="number" id="addAmount" value="1" min="1">
          </div>
          <div class="form-group">
            <label for="addUnit">单位</label>
            <select id="addUnit">
              <option value="day">天</option>
              <option value="week">周</option>
              <option value="month">月</option>
              <option value="year">年</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="addDirection">方向</label>
          <select id="addDirection">
            <option value="after">往后</option>
            <option value="before">往前</option>
          </select>
        </div>
        <button class="btn btn-primary btn-block" id="calcAddBtn">➕ 计算</button>
        <div class="result-box" id="addResult">
          <div class="result-text" id="addResultText"></div>
        </div>
      </div>

      <div class="card">
        <h2>💼 工作日计算</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="bizStart">开始日期</label>
            <input type="date" id="bizStart">
          </div>
          <div class="form-group">
            <label for="bizEnd">结束日期</label>
            <input type="date" id="bizEnd">
          </div>
        </div>
        <button class="btn btn-primary btn-block" id="calcBizBtn">💼 计算工作日</button>
        <div class="result-box" id="bizResult">
          <div class="result-text">工作日天数：<strong id="bizDays" style="font-size:32px;color:var(--accent-2);">0</strong> 天</div>
        </div>
      </div>

      <div class="card">
        <h2>🎂 年龄计算</h2>
        <div class="form-group">
          <label for="birthDate">出生日期</label>
          <input type="date" id="birthDate">
        </div>
        <button class="btn btn-primary btn-block" id="calcAgeBtn">🎂 计算年龄</button>
        <div class="result-box" id="ageResult">
          <div class="result-grid">
            <div class="result-item"><span class="value" id="ageYears">0</span><span class="label">岁</span></div>
            <div class="result-item"><span class="value" id="ageMonths">0</span><span class="label">月</span></div>
            <div class="result-item"><span class="value" id="ageDays">0</span><span class="label">天</span></div>
            <div class="result-item"><span class="value" id="ageTotalDays">0</span><span class="label">总天数</span></div>
          </div>
          <div style="margin-top:12px;padding:10px;background:var(--bg-input);border-radius:var(--radius-sm);border:1px solid var(--border-subtle);text-align:center;">
            <span style="font-size:13px;color:var(--text-tertiary);">下一个生日：</span>
            <span id="ageNextBirthday" style="font-weight:600;color:var(--text-primary);"></span>
            <span style="font-size:13px;color:var(--text-tertiary);margin-left:12px;">还有</span>
            <span id="ageDaysToNext" style="font-weight:700;color:var(--accent-2);font-size:18px;">0</span>
            <span style="font-size:13px;color:var(--text-tertiary);">天</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab 2: 时间戳转换 -->
    <div class="tab-content" id="tab1">
      <div class="card">
        <h2>⏰ 时间戳 → 日期</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="tsInput">输入时间戳</label>
            <input type="text" id="tsInput" placeholder="例如: 1700000000">
          </div>
          <div class="form-group">
            <label for="tsType">时间戳类型</label>
            <select id="tsType">
              <option value="s">秒级时间戳</option>
              <option value="ms" selected>毫秒级时间戳</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary btn-block" id="convertTsBtn">⏰ 转换为日期</button>
        <div class="result-box" id="tsResult">
          <div id="tsFormats"></div>
        </div>
      </div>

      <div class="card">
        <h2>⏱️ 日期 → 时间戳</h2>
        <div class="form-group">
          <label for="dateToTsInput">选择日期时间</label>
          <input type="datetime-local" id="dateToTsInput">
        </div>
        <button class="btn btn-primary btn-block" id="convertDateBtn">⏱️ 转换为时间戳</button>
        <div class="result-box" id="dateTsResult">
          <div class="result-grid">
            <div class="result-item">
              <span class="value" id="tsSeconds" style="font-size:18px;">0</span>
              <span class="label">秒级时间戳</span>
            </div>
            <div class="result-item">
              <span class="value" id="tsMilliseconds" style="font-size:18px;">0</span>
              <span class="label">毫秒级时间戳</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab 3: 时区转换 -->
    <div class="tab-content" id="tab2">
      <div class="card">
        <h2>🌍 时区转换</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="tzFrom">源时区</label>
            <select id="tzFrom"></select>
          </div>
          <div class="form-group">
            <label for="tzTo">目标时区</label>
            <select id="tzTo"></select>
          </div>
        </div>
        <div class="form-group">
          <label for="tzDateTime">日期时间</label>
          <input type="datetime-local" id="tzDateTime">
        </div>
        <button class="btn btn-primary btn-block" id="convertTzBtn">🌍 转换时区</button>
        <div class="result-box" id="tzResult">
          <div class="tz-comparison">
            <div class="tz-box source">
              <div class="tz-label">源时区</div>
              <div class="tz-time" id="tzSource">-</div>
            </div>
            <div class="tz-box target">
              <div class="tz-label">目标时区</div>
              <div class="tz-time" id="tzTarget">-</div>
            </div>
            <div class="tz-offset">⏱️ 时差：<span id="tzOffset">0</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab 4: 节假日查询 -->
    <div class="tab-content" id="tab3">
      <div class="card">
        <h2>📋 节假日列表</h2>
        <div class="form-group">
          <label for="holidayYear">选择年份</label>
          <select id="holidayYear"></select>
        </div>
        <div id="holidayList">
          <div class="empty-hint">请选择年份</div>
        </div>
      </div>

      <div class="card">
        <h2>🔍 日期判断</h2>
        <div class="form-group">
          <label for="holidayDate">选择日期</label>
          <input type="date" id="holidayDate">
        </div>
        <button class="btn btn-primary btn-block" id="checkHolidayBtn">🔍 判断是否为节假日</button>
        <div id="holidayCheckResult" style="margin-top:12px;"></div>
      </div>

      <div class="card">
        <h2>🎯 下一个节假日</h2>
        <button class="btn btn-primary btn-block" id="nextHolidayBtn">🎯 查询下一个节假日</button>
        <div id="nextHolidayResult" style="margin-top:12px;"></div>
      </div>
    </div>

    <!-- 历史记录 -->
    <div class="card">
      <h2>📋 历史记录</h2>
      <div class="history-list" id="historyList">
        <span class="history-empty">暂无记录</span>
      </div>
    </div>
  </div>

  <script src="./node_modules/dayjs/dayjs.min.js"></script>
  <script src="./node_modules/dayjs/plugin/utc.js"></script>
  <script src="./node_modules/dayjs/plugin/timezone.js"></script>
  <script src="./node_modules/dayjs/plugin/customParseFormat.js"></script>
  <script src="./node_modules/dayjs/plugin/advancedFormat.js"></script>
  <script src="./node_modules/dayjs/plugin/isLeapYear.js"></script>
  <script src="./node_modules/dayjs/plugin/isBetween.js"></script>
  <script src="./node_modules/dayjs/plugin/duration.js"></script>
  <script src="./node_modules/dayjs/plugin/relativeTime.js"></script>
  <script>
    dayjs.extend(dayjs_plugin_utc)
    dayjs.extend(dayjs_plugin_timezone)
    dayjs.extend(dayjs_plugin_customParseFormat)
    dayjs.extend(dayjs_plugin_advancedFormat)
    dayjs.extend(dayjs_plugin_isLeapYear)
    dayjs.extend(dayjs_plugin_isBetween)
    dayjs.extend(dayjs_plugin_duration)
    dayjs.extend(dayjs_plugin_relativeTime)
  </script>
  <script src="./config.js"></script>
  <script src="./date-engine.js"></script>
  <script src="./holiday-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
