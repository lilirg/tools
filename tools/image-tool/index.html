<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🖼️ 图片压缩 & 格式转换</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../theme.css">
  <style>
    /* ===== Tool-specific styles ===== */
    .it-dropzone {
      border: 2px dashed var(--border-input);
      border-radius: var(--radius-md);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      background: var(--bg-input);
      position: relative;
    }

    .it-dropzone:hover,
    .it-dropzone.dragover {
      border-color: var(--accent-1);
      background: var(--bg-highlight);
    }

    .it-dropzone-icon { font-size: 48px; display: block; margin-bottom: 12px; }
    .it-dropzone-text { font-size: 15px; color: var(--text-secondary); margin-bottom: 8px; }
    .it-dropzone-hint { font-size: 12px; color: var(--text-muted); }

    .it-dropzone input[type="file"] {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .it-preview-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .it-preview-box {
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .it-preview-header {
      padding: 8px 12px;
      background: var(--bg-tab-hover);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .it-preview-body {
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      background: var(--bg-input);
    }

    .it-preview-body img {
      max-width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: 4px;
    }

    .it-preview-info {
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text-tertiary);
      border-top: 1px solid var(--border-subtle);
      line-height: 1.6;
    }

    .it-preview-info span { display: block; }

    .it-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 16px;
    }

    .it-controls label {
      font-size: 13px;
      color: var(--text-tertiary);
      white-space: nowrap;
    }

    .it-controls select,
    .it-controls input[type="range"] {
      padding: 6px 10px;
      border: 1px solid var(--border-input);
      border-radius: 6px;
      font-size: 13px;
      font-family: var(--font-body);
      background: var(--bg-input);
      color: var(--text-primary);
    }

    .it-controls select:focus { outline: none; border-color: var(--accent-1); }

    .it-quality-value {
      font-size: 13px;
      color: var(--accent-2);
      font-weight: 600;
      min-width: 30px;
      text-align: center;
    }

    .it-batch-list {
      margin-top: 12px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
    }

    .it-batch-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-subtle);
      gap: 12px;
    }
    .it-batch-item:last-child { border-bottom: none; }

    .it-batch-thumb {
      width: 40px; height: 40px;
      border-radius: 4px;
      object-fit: cover;
      background: var(--bg-input);
    }

    .it-batch-name {
      flex: 1;
      font-size: 13px;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .it-batch-size {
      font-size: 12px;
      color: var(--text-tertiary);
      white-space: nowrap;
    }

    .it-batch-status {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .it-batch-status.done { color: var(--accent-8); }
    .it-batch-status.processing { color: var(--accent-5); }
    .it-batch-status.error { color: var(--accent-3); }

    .it-batch-remove {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--accent-9);
      color: #fff;
      border: none;
      font-size: 11px;
      cursor: pointer;
      line-height: 20px;
      text-align: center;
      display: none;
    }

    .it-batch-item:hover .it-batch-remove { display: block; }

    .it-progress-bar {
      height: 4px;
      background: var(--border-subtle);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .it-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .it-progress-text {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 4px;
      text-align: center;
    }

    .it-empty {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .it-empty-icon { font-size: 32px; display: block; margin-bottom: 8px; }

    @media (max-width: 768px) {
      .it-preview-area { grid-template-columns: 1fr; }
      .it-controls { flex-direction: column; align-items: stretch; }
      .it-controls select { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-bar">
      <a class="back-btn" href="../../index.html">← 返回首页</a>
    </div>
    <div class="demo-title">
      <h1>🖼️ 图片压缩 & 格式转换</h1>
      <p>纯前端实现 · 拖拽上传 · 批量处理 · 格式互转</p>
    </div>

    <div class="card">
      <h2>📤 上传图片</h2>
      <div class="it-dropzone" id="dropzone">
        <span class="it-dropzone-icon">📁</span>
        <div class="it-dropzone-text">拖拽图片到此处，或点击选择文件</div>
        <div class="it-dropzone-hint">支持 PNG / JPEG / WebP / BMP / GIF</div>
        <input type="file" id="fileInput" accept="image/*" multiple>
      </div>
    </div>

    <div class="card">
      <h2>⚙️ 处理选项</h2>
      <div class="it-controls">
        <label>输出格式:</label>
        <select id="formatSelect"></select>
        <label>质量:</label>
        <input type="range" id="qualitySlider" min="1" max="100" value="80">
        <span class="it-quality-value" id="qualityValue">80%</span>
        <label>最大宽度:</label>
        <select id="maxWidthSelect"></select>
        <button class="btn btn-primary" id="processBtn">⚡ 处理</button>
        <button class="btn btn-success" id="downloadAllBtn">📦 全部下载</button>
        <button class="btn btn-default" id="clearAllBtn">🔄 清空</button>
      </div>
    </div>

    <div class="card">
      <h2>🖼️ 预览</h2>
      <div class="it-preview-area" id="previewArea">
        <div class="it-preview-box">
          <div class="it-preview-header">
            <span>原始图片</span>
            <span id="originalCount">0 张</span>
          </div>
          <div class="it-preview-body" id="originalPreview">
            <span class="it-empty">
              <span class="it-empty-icon">📷</span>
              请上传图片
            </span>
          </div>
          <div class="it-preview-info" id="originalInfo">
            <span>请上传图片查看信息</span>
          </div>
        </div>
        <div class="it-preview-box">
          <div class="it-preview-header">
            <span>处理后图片</span>
            <span id="processedCount">0 张</span>
          </div>
          <div class="it-preview-body" id="processedPreview">
            <span class="it-empty">
              <span class="it-empty-icon">⚙️</span>
              点击"处理"查看结果
            </span>
          </div>
          <div class="it-preview-info" id="processedInfo">
            <span>点击"处理"查看结果</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>📋 批量处理列表</h2>
      <div class="it-batch-list" id="batchList">
        <div class="it-empty">
          <span class="it-empty-icon">📋</span>
          暂无文件
        </div>
      </div>
      <div class="it-progress-bar" id="progressBar" style="display:none;">
        <div class="it-progress-fill" id="progressFill"></div>
      </div>
      <div class="it-progress-text" id="progressText"></div>
    </div>
  </div>

  <script src="./config.js"></script>
  <script src="./image-engine.js"></script>
  <script src="./app.js"></script>
</body>
</html>
