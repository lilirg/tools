<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>📝 Markdown 预览 & 编辑</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../theme.css">
  <style>
    /* ===== Tool-specific styles ===== */
    .md-toolbar {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      padding: 8px 10px;
      background: var(--bg-tab-hover);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      border-bottom: none;
    }

    .md-toolbar-btn {
      width: 32px; height: 32px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .md-toolbar-btn:hover {
      background: var(--bg-input);
      color: var(--text-primary);
    }

    .md-toolbar-sep {
      width: 1px;
      background: var(--border-subtle);
      margin: 4px 4px;
    }

    .md-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border: 1px solid var(--border-subtle);
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      overflow: hidden;
    }

    .md-editor-pane {
      border-right: 1px solid var(--border-subtle);
    }

    .md-editor-pane textarea {
      width: 100%;
      height: 500px;
      padding: 16px;
      border: none;
      font-size: 14px;
      font-family: var(--font-mono);
      line-height: 1.7;
      resize: vertical;
      background: var(--bg-input);
      color: var(--text-primary);
    }

    .md-editor-pane textarea:focus { outline: none; }

    .md-preview-pane {
      padding: 16px;
      height: 500px;
      overflow-y: auto;
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.7;
    }

    .md-preview-pane h1 { font-size: 26px; font-weight: 700; margin: 0 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-subtle); }
    .md-preview-pane h2 { font-size: 22px; font-weight: 700; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border-subtle); }
    .md-preview-pane h3 { font-size: 18px; font-weight: 600; margin: 16px 0 8px; }
    .md-preview-pane h4 { font-size: 16px; font-weight: 600; margin: 12px 0 6px; }
    .md-preview-pane p { margin: 0 0 12px; }
    .md-preview-pane ul, .md-preview-pane ol { margin: 0 0 12px; padding-left: 24px; }
    .md-preview-pane li { margin-bottom: 4px; }
    .md-preview-pane blockquote {
      margin: 0 0 12px;
      padding: 8px 16px;
      border-left: 4px solid var(--accent-1);
      background: var(--bg-input);
      border-radius: 0 4px 4px 0;
      color: var(--text-secondary);
    }
    .md-preview-pane code {
      padding: 2px 6px;
      background: var(--bg-input);
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--accent-2);
    }
    .md-preview-pane pre {
      margin: 0 0 12px;
      padding: 12px 16px;
      background: var(--bg-input);
      border-radius: 6px;
      overflow-x: auto;
    }
    .md-preview-pane pre code {
      padding: 0;
      background: none;
      color: var(--text-primary);
    }
    .md-preview-pane table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 12px;
    }
    .md-preview-pane th, .md-preview-pane td {
      padding: 8px 12px;
      border: 1px solid var(--border-subtle);
      text-align: left;
    }
    .md-preview-pane th {
      background: var(--bg-tab-hover);
      font-weight: 600;
    }
    .md-preview-pane hr {
      border: none;
      border-top: 1px solid var(--border-subtle);
      margin: 16px 0;
    }
    .md-preview-pane a { color: var(--accent-2); text-decoration: none; }
    .md-preview-pane a:hover { text-decoration: underline; }
    .md-preview-pane img { max-width: 100%; border-radius: 6px; margin: 8px 0; }
    .md-preview-pane strong { font-weight: 700; }
    .md-preview-pane em { font-style: italic; }
    .md-preview-pane del { text-decoration: line-through; color: var(--text-tertiary); }
    .md-preview-pane input[type="checkbox"] { margin-right: 6px; }

    .md-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .md-template-select {
      padding: 8px 12px;
      border: 1px solid var(--border-input);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: var(--font-body);
      background: var(--bg-input);
      color: var(--text-primary);
      cursor: pointer;
      min-width: 180px;
    }

    .md-template-select:focus { outline: none; border-color: var(--accent-1); }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .md-history-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
    }
    .md-history-item:last-child { border-bottom: none; }

    .md-history-title {
      font-size: 13px;
      color: var(--text-primary);
      flex: 1;
    }

    .md-history-detail {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-left: 8px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .md-history-remove {
      position: absolute;
      right: 4px; top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent-9);
      color: #fff;
      border: none;
      font-size: 11px;
      cursor: pointer;
      display: none;
      line-height: 18px;
      text-align: center;
    }

    .md-history-item:hover .md-history-remove { display: block; }

    .md-empty {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: 10px;
      display: block;
    }

    @media (max-width: 768px) {
      .md-layout { grid-template-columns: 1fr; }
      .md-editor-pane { border-right: none; border-bottom: 1px solid var(--border-subtle); }
      .md-editor-pane textarea { height: 300px; }
      .md-preview-pane { height: 300px; }
      .md-toolbar { gap: 2px; }
      .md-toolbar-btn { width: 28px; height: 28px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-bar">
      <a class="back-btn" href="../index.html">← 返回首页</a>
    </div>
    <div class="demo-title">
      <h1>📝 Markdown 预览 & 编辑</h1>
      <p>纯前端实现 · 实时预览 · 工具栏快捷插入 · 导出 HTML</p>
    </div>

    <div class="card">
      <h2>📄 编辑器</h2>
      <div class="md-toolbar" id="mdToolbar">
        <button class="md-toolbar-btn" data-cmd="bold" title="粗体">𝐁</button>
        <button class="md-toolbar-btn" data-cmd="italic" title="斜体"><i>𝐼</i></button>
        <button class="md-toolbar-btn" data-cmd="strikethrough" title="删除线">~~</button>
        <div class="md-toolbar-sep"></div>
        <button class="md-toolbar-btn" data-cmd="h1" title="标题1">H1</button>
        <button class="md-toolbar-btn" data-cmd="h2" title="标题2">H2</button>
        <button class="md-toolbar-btn" data-cmd="h3" title="标题3">H3</button>
        <div class="md-toolbar-sep"></div>
        <button class="md-toolbar-btn" data-cmd="ul" title="无序列表">•</button>
        <button class="md-toolbar-btn" data-cmd="ol" title="有序列表">1.</button>
        <button class="md-toolbar-btn" data-cmd="task" title="任务列表">☐</button>
        <div class="md-toolbar-sep"></div>
        <button class="md-toolbar-btn" data-cmd="link" title="链接">🔗</button>
        <button class="md-toolbar-btn" data-cmd="image" title="图片">🖼</button>
        <button class="md-toolbar-btn" data-cmd="code" title="行内代码">`</button>
        <button class="md-toolbar-btn" data-cmd="codeblock" title="代码块">```</button>
        <button class="md-toolbar-btn" data-cmd="blockquote" title="引用">❝</button>
        <div class="md-toolbar-sep"></div>
        <button class="md-toolbar-btn" data-cmd="table" title="表格">⊞</button>
        <button class="md-toolbar-btn" data-cmd="hr" title="分割线">—</button>
      </div>

      <div class="md-layout">
        <div class="md-editor-pane">
          <textarea id="mdEditor" placeholder="在此输入 Markdown 内容..." spellcheck="false"># 欢迎使用 Markdown 编辑器

## 功能特性

- **实时预览**：左侧编辑，右侧即时渲染
- **工具栏**：快捷插入常用 Markdown 语法
- **模板支持**：快速开始常用文档
- **导出 HTML**：一键导出为 HTML 文件

## 语法示例

### 文本样式

**粗体文本**，*斜体文本*，~~删除线文本~~，`行内代码`

### 列表

1. 有序列表项 1
2. 有序列表项 2
3. 有序列表项 3

### 引用

> 这是一段引用文本
> 可以包含多行

### 代码块

```javascript
function hello() {
  console.log("Hello, Markdown!");
}
```

### 表格

| 名称 | 版本 | 说明 |
|------|------|------|
| Vue  | 3.x  | 前端框架 |
| Vite | 5.x  | 构建工具 |

### 任务列表

- [x] 已完成任务
- [ ] 待办任务
- [ ] 进行中任务

---

*开始编辑吧！*</textarea>
        </div>
        <div class="md-preview-pane" id="mdPreview"></div>
      </div>

      <div class="md-actions">
        <select class="md-template-select" id="templateSelect"></select>
        <button class="btn btn-primary" id="exportHtmlBtn">📄 导出 HTML</button>
        <button class="btn btn-success" id="copyBtn">📋 复制</button>
        <button class="btn btn-default" id="clearBtn">🔄 清空</button>
      </div>
    </div>

    <div class="card">
      <div class="history-header">
        <h2>📋 历史记录</h2>
        <button class="btn btn-small btn-danger" id="clearHistoryBtn">🗑️ 清空</button>
      </div>
      <div id="historyList">
        <span class="md-empty">暂无记录</span>
      </div>
    </div>
  </div>

  <script src="./config.js"></script>
  <script src="./markdown-engine.js"></script>
  <script src="./app.js"></script>
</body>
</html>
