<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>📐 单位换算工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../theme.css">
  <style>
    /* ===== Tool-specific styles ===== */
    .uc-category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
    }

    .uc-category-btn {
      padding: 10px 8px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-tertiary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      font-family: var(--font-body);
    }

    .uc-category-btn:hover {
      border-color: var(--accent-1);
      color: var(--accent-2);
      background: var(--bg-highlight);
    }

    .uc-category-btn.active {
      background: var(--accent-1);
      color: #fff;
      border-color: var(--accent-1);
    }

    .uc-category-icon { font-size: 20px; display: block; margin-bottom: 4px; }

    .uc-converter {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
    }

    .uc-input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .uc-input-group input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--border-input);
      border-radius: var(--radius-sm);
      font-size: 18px;
      font-family: var(--font-mono);
      background: var(--bg-input);
      color: var(--text-primary);
      transition: var(--transition);
    }

    .uc-input-group input:focus {
      outline: none;
      border-color: var(--accent-1);
      box-shadow: 0 0 0 2px rgba(108,92,231,0.15);
    }

    .uc-input-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-input);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: var(--font-body);
      background: var(--bg-input);
      color: var(--text-primary);
      cursor: pointer;
    }

    .uc-input-group select:focus { outline: none; border-color: var(--accent-1); }

    .uc-swap-btn {
      width: 44px; height: 44px;
      border: 2px solid var(--border-subtle);
      border-radius: 50%;
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .uc-swap-btn:hover {
      border-color: var(--accent-1);
      color: var(--accent-2);
      background: var(--bg-highlight);
      transform: rotate(180deg);
    }

    .uc-result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .uc-result-row:last-child { border-bottom: none; }

    .uc-result-label {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .uc-result-value {
      font-size: 14px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-weight: 600;
    }

    .uc-history-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
    }
    .uc-history-item:last-child { border-bottom: none; }

    .uc-history-title {
      font-size: 13px;
      color: var(--text-primary);
      flex: 1;
    }

    .uc-history-detail {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-left: 8px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .uc-history-remove {
      position: absolute;
      right: 4px; top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent-9);
      color: #fff;
      border: none;
      font-size: 11px;
      cursor: pointer;
      display: none;
      line-height: 18px;
      text-align: center;
    }

    .uc-history-item:hover .uc-history-remove { display: block; }

    .uc-empty {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: 10px;
      display: block;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    @media (max-width: 768px) {
      .uc-converter { grid-template-columns: 1fr; }
      .uc-swap-btn {
        width: 36px; height: 36px;
        font-size: 16px;
        margin: 0 auto;
        transform: rotate(90deg);
      }
      .uc-swap-btn:hover { transform: rotate(270deg); }
      .uc-category-grid { grid-template-columns: repeat(3, 1fr); }
      .uc-input-group input { font-size: 16px; }
    }

    @media (max-width: 400px) {
      .uc-category-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-bar">
      <a class="back-btn" href="../index.html">← 返回首页</a>
    </div>
    <div class="demo-title">
      <h1>📐 单位换算工具</h1>
      <p>纯前端实现 · 12 类别 · 100+ 单位 · 实时换算</p>
    </div>

    <div class="card">
      <h2>📂 选择类别</h2>
      <div class="uc-category-grid" id="categoryGrid"></div>
    </div>

    <div class="card">
      <h2>🔄 单位换算</h2>
      <div class="uc-converter">
        <div class="uc-input-group">
          <input type="text" id="fromValue" placeholder="输入数值" spellcheck="false">
          <select id="fromUnit"></select>
        </div>
        <button class="uc-swap-btn" id="swapBtn">⇄</button>
        <div class="uc-input-group">
          <input type="text" id="toValue" placeholder="换算结果" readonly spellcheck="false">
          <select id="toUnit"></select>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>📊 详细换算结果</h2>
      <div id="detailResults">
        <span class="uc-empty">输入数值查看详细换算结果</span>
      </div>
    </div>

    <div class="card">
      <div class="history-header">
        <h2>📋 换算历史</h2>
        <button class="btn btn-small btn-danger" id="clearHistoryBtn">🗑️ 清空</button>
      </div>
      <div id="historyList">
        <span class="uc-empty">暂无记录</span>
      </div>
    </div>
  </div>

  <script src="./config.js"></script>
  <script src="./conversion-data.js"></script>
  <script src="./converter-engine.js"></script>
  <script src="./app.js"></script>
</body>
</html>
