<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web 小工具合集</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      color: #fff;
    }

    .header {
      text-align: center;
      padding: 60px 20px 40px;
    }

    .header h1 {
      font-size: 42px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .header p {
      color: rgba(255,255,255,0.6);
      font-size: 16px;
    }

    .tools-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .tool-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 28px;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .tool-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .tool-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .tool-card:hover::before {
      opacity: 1;
    }

    .tool-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }

    .tool-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .tool-desc {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .tool-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tool-tag {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      background: rgba(102, 126, 234, 0.2);
      color: #667eea;
      border: 1px solid rgba(102, 126, 234, 0.3);
    }

    .tool-link {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      text-decoration: none;
      transition: all 0.2s;
    }

    .tool-link:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .footer {
      text-align: center;
      padding: 30px;
      color: rgba(255,255,255,0.3);
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .header h1 { font-size: 28px; }
      .header { padding: 40px 20px 30px; }
      .tools-grid { grid-template-columns: 1fr; padding: 0 16px 40px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛠️ Web 小工具合集</h1>
    <p>原生无依赖 · 即开即用 · 纯前端实现</p>
  </div>

  <div class="tools-grid">
    <div class="tool-card" onclick="location.href='tools/signature-pad/index.html'">
      <span class="tool-icon">✍️</span>
      <div class="tool-name">手写签名插件</div>
      <div class="tool-desc">
        支持鼠标 + 手写笔签名，速度感知仿真笔迹，收笔笔锋效果，可保存为 PNG base64 并自动上传
      </div>
      <div class="tool-tags">
        <span class="tool-tag">Canvas</span>
        <span class="tool-tag">手写仿真</span>
        <span class="tool-tag">自动上传</span>
      </div>
      <a class="tool-link" href="tools/signature-pad/index.html">打开 →</a>
    </div>

    <div class="tool-card" onclick="location.href='tools/qrcode-generator/index.html'">
      <span class="tool-icon">📱</span>
      <div class="tool-name">二维码生成器</div>
      <div class="tool-desc">
        纯前端 QR 码生成，支持自定义颜色/Logo/样式，可下载 PNG/SVG，支持历史记录
      </div>
      <div class="tool-tags">
        <span class="tool-tag">QR Code</span>
        <span class="tool-tag">Canvas</span>
        <span class="tool-tag">SVG</span>
      </div>
      <a class="tool-link" href="tools/qrcode-generator/index.html">打开 →</a>
    </div>

    <div class="tool-card" style="opacity:0.4;cursor:default;">
      <span class="tool-icon">🔧</span>
      <div class="tool-name">更多工具开发中...</div>
      <div class="tool-desc">后续将添加 JSON 格式化、颜色选择器等小工具</div>
      <div class="tool-tags">
        <span class="tool-tag">Coming Soon</span>
      </div>
    </div>
  </div>

  <div class="footer">
    Web Tools Collection &copy; 2026
  </div>
</body>
</html>
